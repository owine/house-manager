# YAML anchor for the env block shared by web and worker (DRY).
x-app-env: &app-env
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  AUTH_SECRET: ${AUTH_SECRET}
  AUTH_URL: ${AUTH_URL}
  AUTH_OIDC_ISSUER: ${AUTH_OIDC_ISSUER}
  AUTH_OIDC_CLIENT_ID: ${AUTH_OIDC_CLIENT_ID}
  AUTH_OIDC_CLIENT_SECRET: ${AUTH_OIDC_CLIENT_SECRET}
  MEILI_HOST: http://meilisearch:7700
  MEILI_KEY: ${MEILI_KEY}
  FILES_DIR: /data/files
  NODE_ENV: production
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  # Plan 4c — Ask / RAG. Opt-in per deployment; flip ASK_ENABLED=true and
  # set VOYAGE_API_KEY when you want the feature live.
  ASK_ENABLED: ${ASK_ENABLED:-false}
  VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
  OCR_BACKEND: ${OCR_BACKEND:-tesseract}
  # Optional observability vars. Set these once GlitchTip / Loki are running.
  # SENTRY_DSN: ${SENTRY_DSN:-}
  # NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
  # SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
  # LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  db:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.44
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    ports: ["7700:7700"]
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    image: house-manager:dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment: *app-env
    volumes:
      - files:/data/files
    ports: ["3000:3000"]
    command: sh -c "pnpm db:deploy && pnpm db:seed && pnpm start"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    build: .
    image: house-manager:dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment: *app-env
    volumes:
      - files:/data/files
      - ${BACKUP_DIR:-./db-backups}:/backups
    command: pnpm worker:start
    # No healthcheck: the worker is a long-running process with no HTTP surface.
    # docker auto-restarts on crash via restart: unless-stopped.

volumes:
  pgdata:
  meilidata:
  files:
