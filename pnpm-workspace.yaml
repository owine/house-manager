savePrefix: ""

# Opt out of v11's default 1-day quarantine on newly-published packages.
# Renovate already gates dep currency for us, and PRs go through CI before
# merging anyway, so the extra layer just delays patch updates without
# adding meaningful supply-chain protection here.
minimumReleaseAge: 0

# Build-script allowlist (replaces v10's `pnpm.onlyBuiltDependencies` and
# the silent-warning-on-ignored default). v11 makes ignored build scripts
# a hard error via `strictDepBuilds: true`, so every package below needs
# explicit approval. Keep this list minimal — entries here run arbitrary
# code at install time. Each was vetted at the time of inclusion.
allowBuilds:
  "@prisma/engines": true # downloads Prisma query engine binaries
  "@sentry/cli": true # downloads sentry-cli native binary
  "cpu-features": true # builds native CPU feature detection (transitive of ssh2)
  "esbuild": true # builds platform-specific esbuild binary
  "lefthook": true # installs git hooks
  "msw": true # writes service-worker file (transitive)
  "prisma": true # CLI ships native binaries
  "protobufjs": true # generates static protobuf code (transitive)
  "sharp": true # builds libvips bindings
  "ssh2": true # optional native crypto (transitive)
  tesseract.js: true # downloads English language data at install time (Plan 4c)

# Dependency overrides. Moved here from package.json's `pnpm.overrides`
# so v11 reads them — v11 stopped reading the package.json field in
# pnpm@11.0.0. Same comparator-key syntax works in both v10 and v11.
overrides:
  "postcss@<8.5.12": "8.5.14"
  "uuid@<14.0.0": "14.0.0"
  "@hono/node-server@<2.0.1": "2.0.2"
