pre-commit:
  parallel: true
  commands:
    biome:
      glob: '*.{ts,tsx,js,jsx,json}'
      run: eval "$(fnm env)" && fnm use --silent-if-unchanged && pnpm exec biome check --staged --no-errors-on-unmatched {staged_files}
    typecheck:
      glob: '*.{ts,tsx}'
      run: eval "$(fnm env)" && fnm use --silent-if-unchanged && pnpm typecheck
    ggshield:
      # GitGuardian secret scan on staged content. Skipped when GITGUARDIAN_API_KEY
      # is unset so contributors without a GG account aren't blocked. CI runs the
      # full scan via GitGuardian/ggshield-action.
      run: |
        if [ -n "$GITGUARDIAN_API_KEY" ] && command -v ggshield >/dev/null 2>&1; then
          ggshield secret scan pre-commit
        else
          echo "ggshield: skipped (GITGUARDIAN_API_KEY unset or ggshield not installed)"
        fi

pre-push:
  parallel: true
  commands:
    test-changed:
      run: eval "$(fnm env)" && fnm use --silent-if-unchanged && pnpm test:unit
    knip:
      # Whole-repo dead-code/unused-export scan. Lives here, not pre-commit:
      # it analyzes the full import graph (can't be scoped to staged files) and
      # flags exports that are legitimately transient mid-branch. Push sees the
      # finished branch state. DATABASE_URL is a throwaway — knip only loads
      # prisma.config.ts to resolve the schema, it never opens a connection.
      run: eval "$(fnm env)" && fnm use --silent-if-unchanged && DATABASE_URL="postgresql://knip:knip@localhost:5432/knip" pnpm lint:knip
