name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Kept in lockstep with package.json `packageManager`/`engines`, .nvmrc,
  # and Dockerfile via Renovate (see renovate.json customManagers + the
  # toolchain-versions packageRule).
  # renovate: datasource=npm depName=pnpm
  PNPM_VERSION: 11.11.0
  # renovate: datasource=node-version depName=node
  NODE_VERSION: 24.18.0

jobs:
  # Detect whether any image-affecting paths changed. Used to gate the
  # build-image job on PRs so we only burn CI time when the change could
  # plausibly break the Docker build (e.g., Dockerfile, Next.js code,
  # Prisma schema, deps), not on doc/test-only PRs. Negative-filter
  # approach: default to "build" unless every changed file is something
  # that demonstrably can't affect the image bytes.
  changes:
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.filter.outputs.image }}
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          # `every`: a changed file matches a filter only if it satisfies ALL
          # rules. Without this, dorny's default OR semantics make the leading
          # `**` match everything, so the `!`-exclusions are no-ops and every
          # filter is always true (build-image ran on docs/test-only changes;
          # the `tests` gate never skipped heavy jobs). With `every`, a file
          # must match `**` AND none of the `!` excludes. Verified: a docs-only
          # change yields image=false + tests=false; a *.test.ts-only change
          # yields image=false (no image build) + tests=true.
          predicate-quantifier: 'every'
          filters: |
            image:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!tests/**'
              - '!**/*.test.ts'
              - '!**/*.test.tsx'
              - '!playwright.config.ts'
              - '!vitest*.config.ts'
              - '!.gitignore'
              - '!.gitattributes'
              - '!LICENSE'
              - '!lefthook.yml'
              - '!biome.json'
              - '!renovate.json'
            tests:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!LICENSE'

  ggshield:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: GitGuardian secret scan
        uses: GitGuardian/ggshield-action@da20be06cafe5e8633dc24744efe1efe8d30f06b # v1.52.2
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
      - run: pnpm typecheck

  migrate-check:
    runs-on: ubuntu-24.04
    services:
      db:
        image: pgvector/pgvector:pg18@sha256:12a379b47ad65289572ea0756efc11b7c241a6662833e8af7038cd3b73d647e0
        env:
          POSTGRES_USER: housemanager
          POSTGRES_PASSWORD: test
          POSTGRES_DB: housemanager
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U housemanager"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://housemanager:test@localhost:5432/housemanager
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - name: Apply committed migrations to a fresh DB
        run: pnpm db:deploy
      - name: Verify schema.prisma has no uncommitted drift vs the deployed DB
        # Prisma 7 cannot model vector indexes; the IVFFlat index on
        # `embeddings(embedding)` is declared in raw SQL inside the migration,
        # so `migrate diff` always reports it as a removed index relative to
        # schema.prisma. Filter that one known line out before checking the
        # exit status. Any other diff content fails the job.
        run: |
          set -o pipefail
          diff_output=$(pnpm exec prisma migrate diff \
            --from-config-datasource \
            --to-schema prisma/schema.prisma 2>&1 || true)
          echo "$diff_output"
          residual=$(echo "$diff_output" | grep -vE '^\s*(\[\*\] Changed the `embeddings` table|\s*\[-\] Removed index on columns \(embedding\)|Loaded Prisma config from|No difference detected\.|$)' || true)
          if [ -n "$residual" ]; then
            echo "::error::Unexpected schema drift (see above)"
            exit 1
          fi

  unit:
    needs: changes
    if: needs.changes.outputs.tests == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
      # Collect a coverage blob (no per-job threshold enforcement — this job
      # sees only unit coverage, which is below the combined floor by design).
      # `--reporter=blob` does NOT suppress thresholds in Vitest 4, so override
      # them to 0 here; the downstream `coverage` job merges both blobs and
      # applies the real floor once against the combined report.
      # Pair blob with the default reporter so a failure prints the failing
      # test name + diff in THIS job's log. With blob alone the log shows only
      # "exit code 1", and the `coverage` job that would decode the blob is
      # skipped when this job fails — so the failure detail never surfaces.
      # Multiple reporters require the per-reporter `--outputFile.blob=` form.
      - run: pnpm test:unit --coverage --reporter=blob --reporter=default --outputFile.blob=.vitest-reports/blob-unit.json --coverage.thresholds.lines=0 --coverage.thresholds.functions=0 --coverage.thresholds.statements=0 --coverage.thresholds.branches=0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-unit
          path: .vitest-reports/blob-unit.json
          if-no-files-found: error
          retention-days: 1

  integration:
    needs: changes
    if: needs.changes.outputs.tests == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
      # See unit job: collect a coverage blob with thresholds overridden to 0;
      # the `coverage` job merges both blobs and enforces the real floor. Pair
      # blob with the default reporter so a failure names the failing test in
      # this job's log instead of a bare "exit code 1" (the decode happens in
      # the `coverage` job, which is skipped on failure).
      - run: pnpm test:integration --coverage --reporter=blob --reporter=default --outputFile.blob=.vitest-reports/blob-integration.json --coverage.thresholds.lines=0 --coverage.thresholds.functions=0 --coverage.thresholds.statements=0 --coverage.thresholds.branches=0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-integration
          path: .vitest-reports/blob-integration.json
          if-no-files-found: error
          retention-days: 1

  e2e:
    needs: changes
    if: needs.changes.outputs.tests == 'true'
    runs-on: ubuntu-24.04
    services:
      db:
        image: pgvector/pgvector:pg18@sha256:12a379b47ad65289572ea0756efc11b7c241a6662833e8af7038cd3b73d647e0
        env:
          POSTGRES_USER: housemanager
          POSTGRES_PASSWORD: test
          POSTGRES_DB: housemanager
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U housemanager"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      meilisearch:
        image: getmeili/meilisearch:v1.49@sha256:bdc7d7e7939911c40d88d6bcd01f9c72c81f7293135916d48bce241569f721bd
        env:
          MEILI_MASTER_KEY: test
          MEILI_ENV: development
        ports: ['7700:7700']
    env:
      DATABASE_URL: postgresql://housemanager:test@localhost:5432/housemanager
      AUTH_SECRET: a-very-long-secret-for-ci-only-not-real-use-32chars
      AUTH_URL: http://localhost:3000
      AUTH_OIDC_ISSUER: http://localhost:9999
      AUTH_OIDC_CLIENT_ID: house-manager
      AUTH_OIDC_CLIENT_SECRET: test
      MEILI_HOST: http://localhost:7700
      MEILI_KEY: test
      FILES_DIR: /tmp/files
      NODE_ENV: development
      # Required by lib/env.ts so the dev server can boot. Push delivery
      # is not exercised in e2e; any non-empty fixture values pass the schema.
      WEB_PUSH_VAPID_PUBLIC_KEY: ci-vapid-public-key-fixture
      WEB_PUSH_VAPID_PRIVATE_KEY: ci-vapid-private-key-fixture
      WEB_PUSH_CONTACT_EMAIL: mailto:ci@example.com
      FORWARDEMAIL_API_KEY: ci-forwardemail-key
      FORWARDEMAIL_FROM_ADDRESS: ci@example.com
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-test-placeholder-not-used-in-ci' }}
      LOG_LEVEL: info
      # SENTRY_DSN intentionally unset in CI; SDK no-ops gracefully.
      # NEXT_PUBLIC_SENTRY_DSN intentionally unset; browser SDK no-ops gracefully.
      # SENTRY_AUTH_TOKEN intentionally unset; source-map upload skipped.
      # Ask/RAG (Plan 4c): feature gated off in CI to keep e2e cheap and
      # to avoid needing a real Voyage key. OCR backend off prevents the
      # Tesseract.js wasm load on every test run.
      ASK_ENABLED: 'false'
      OCR_BACKEND: 'none'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:deploy
      - run: pnpm db:seed
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e:critical
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # Accessibility: axe-core WCAG 2.1 AA scans over every route (empty + populated,
  # desktop + mobile). Its own job (not folded into e2e, which runs @critical only)
  # because it walks the full route set. Mirrors the e2e job's services + env.
  a11y:
    needs: changes
    if: needs.changes.outputs.tests == 'true'
    runs-on: ubuntu-24.04
    services:
      db:
        image: pgvector/pgvector:pg18@sha256:12a379b47ad65289572ea0756efc11b7c241a6662833e8af7038cd3b73d647e0
        env:
          POSTGRES_USER: housemanager
          POSTGRES_PASSWORD: test
          POSTGRES_DB: housemanager
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U housemanager"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      meilisearch:
        image: getmeili/meilisearch:v1.49@sha256:bdc7d7e7939911c40d88d6bcd01f9c72c81f7293135916d48bce241569f721bd
        env:
          MEILI_MASTER_KEY: test
          MEILI_ENV: development
        ports: ['7700:7700']
    env:
      DATABASE_URL: postgresql://housemanager:test@localhost:5432/housemanager
      AUTH_SECRET: a-very-long-secret-for-ci-only-not-real-use-32chars
      AUTH_URL: http://localhost:3000
      AUTH_OIDC_ISSUER: http://localhost:9999
      AUTH_OIDC_CLIENT_ID: house-manager
      AUTH_OIDC_CLIENT_SECRET: test
      MEILI_HOST: http://localhost:7700
      MEILI_KEY: test
      FILES_DIR: /tmp/files
      NODE_ENV: development
      WEB_PUSH_VAPID_PUBLIC_KEY: ci-vapid-public-key-fixture
      WEB_PUSH_VAPID_PRIVATE_KEY: ci-vapid-private-key-fixture
      WEB_PUSH_CONTACT_EMAIL: mailto:ci@example.com
      FORWARDEMAIL_API_KEY: ci-forwardemail-key
      FORWARDEMAIL_FROM_ADDRESS: ci@example.com
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-test-placeholder-not-used-in-ci' }}
      LOG_LEVEL: info
      ASK_ENABLED: 'false'
      OCR_BACKEND: 'none'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:deploy
      - run: pnpm db:seed
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:a11y
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 14

  # Merge the coverage blobs emitted by the parallel unit + integration jobs
  # and enforce the configured thresholds (vitest.config.ts) once against the
  # COMBINED report. The individual jobs deliberately don't enforce — neither
  # alone would clear the floor, and double-enforcing would be wrong.
  coverage:
    needs: [changes, unit, integration]
    if: needs.changes.outputs.tests == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Both artifacts land flat in .vitest-reports/ (each is a single
      # blob-*.json), which is the directory `--merge-reports` reads.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: .vitest-reports
          pattern: coverage-*
          merge-multiple: true
      # Merge unit+integration blobs and apply the coverage thresholds to the
      # combined report. `--coverage` here makes vitest enforce the floor;
      # the run fails if combined coverage is below it.
      - run: pnpm exec vitest --merge-reports=.vitest-reports --coverage --reporter=default

  build-image:
    needs: [changes, ggshield, lint, typecheck, migrate-check, unit, integration, e2e, a11y, coverage]
    # Always build on main (so we can push + publish a manifest for every
    # commit). On PRs, only build when image-affecting paths changed —
    # this catches regressions like the Plan 5a SENTRY_DSN one (broken
    # docker build that PR CI didn't surface) without burning CI on
    # doc-only PRs. Push only on main; PR builds verify the build
    # succeeds without polluting GHCR.
    # Test jobs (unit/integration/e2e/coverage) are now conditional, so on a
    # docs-only push to main they SKIP — and a skipped `needs` would normally
    # cascade-skip build-image, breaking the per-commit publish. always() lets
    # this run despite skipped deps, while still failing fast on a real
    # failure/cancellation upstream.
    if: >-
      always()
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
      && (github.ref == 'refs/heads/main' || needs.changes.outputs.image == 'true')
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          # On main: build by digest and push to GHCR; publish-manifest
          # downstream consumes the digest. On PRs: build to verify the
          # Dockerfile + bundle works, but don't push (no GHCR pollution).
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=${{ github.ref == 'refs/heads/main' }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
      - name: Export digest
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    needs: build-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          # Build the args via arrays so shellcheck doesn't complain about
          # unquoted command substitution (SC2046) — the original
          # $(jq ...) / $(printf ...) form relied on word splitting,
          # which is correct here but a real foot-gun pattern.
          tags=()
          while IFS= read -r tag; do
            tags+=(-t "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          images=()
          for digest in *; do
            images+=("ghcr.io/${{ github.repository }}@sha256:$digest")
          done
          docker buildx imagetools create "${tags[@]}" "${images[@]}"
      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}

  # Single aggregator gate for branch protection. Path-filtered jobs
  # (unit/integration/e2e/a11y/coverage/build-image) skip on docs-only PRs,
  # but their matrix-named contexts are still listed as required in the
  # ruleset — which leaves docs-only PRs permanently BLOCKED with "expected
  # check not reported". Requiring only this aggregator (instead of each
  # underlying matrix child) lets a SKIP count as passing while a real
  # failure still fails. Mirrors the `always() && !failure() && !cancelled()`
  # idiom already used by `build-image` above.
  ci-pass:
    needs: [changes, ggshield, lint, typecheck, migrate-check, unit, integration, e2e, a11y, coverage, build-image]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: All required jobs passed or were appropriately skipped
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          # Log only the per-job `result` field, never the full `needs` blob.
          # `outputs` declared by upstream jobs could carry sensitive values
          # if anyone adds one in the future; restricting the dump to results
          # keeps the diagnostic ("which job failed?") without the leak risk.
          echo "$NEEDS_JSON" | jq 'map_values({result})'
          if echo "$NEEDS_JSON" | jq -e 'any(.[].result; . == "failure" or . == "cancelled")' >/dev/null; then
            echo "::error::One or more required jobs failed or were cancelled."
            exit 1
          fi
